<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenu</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .reception {
      text-align: center;
      padding: 2rem;
      max-width: 520px;
      width: 100%;
    }

    .icon-top {
      font-size: 64px;
      margin-bottom: 1.2rem;
      display: block;
    }

    .reception h1 {
      font-size: 1.9rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 0.5rem;
    }

    .reception p {
      color: #6b7280;
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 15px 24px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: transform .15s, box-shadow .15s;
      border: none;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }

    .btn-primary {
      background: #111827;
      color: #fff;
    }

    .btn-secondary {
      background: #fff;
      color: #111827;
      border: 1.5px solid #d1d5db;
    }

    .btn i { font-size: 20px; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #9ca3af;
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .badge {
      margin-top: 2rem;
      font-size: 11px;
      color: #9ca3af;
    }
  </style>
</head>
<body>

  <div class="reception">
    <span class="icon-top">🛍️</span>
    <h1>Bienvenu chez SuperMarket Together</h1>
    <p>Découvrez des milliers de produits — vêtements, électronique, chaussures et plus encore.</p>

    <div class="buttons">
      <a href="inscription.html" class="btn btn-primary">
        <i class="ti ti-user-plus"></i>
        Créer un compte
      </a>

      <div class="divider">ou</div>

      <a href="Vetements.html" target="_self" class="btn btn-secondary" onclick="naviguerSansCompte()">
        <i class="ti ti-shopping-bag"></i>
        Naviguer sans compte
      </a>
    </div>

    <p class="badge">🔒 Vos données sont protégées</p>
  </div>

  <script>
    function naviguerSansCompte() {
      // Redirige vers la page des produits dans l'iframe parent
      if (window.parent && window.parent !== window) {
        window.parent.document.querySelector('iframe[name="contenu"]').src = 'Vetements.html';
      }
    }
  </script>

</body>
</html>
